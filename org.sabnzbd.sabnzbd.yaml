app-id: org.sabnzbd.sabnzbd
command: SABnzbd.py
runtime: org.freedesktop.Platform
# Remember to also update both env and container image in auto-update.yaml on runtime-version bumps
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
rename-desktop-file: sabnzbd.desktop
rename-icon: sabnzbd
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --system-talk-name=org.freedesktop.login1
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.PowerManagement
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-download
  - --filesystem=/mnt
  - --filesystem=/media
  - --filesystem=/run/media
  - --persist=.sabnzbd
cleanup:
  - '*.a'
  - '*.la'
  - /include
  - /lib/pkgconfig
  - /man
  - /share/man
  - /share/doc
  # Parts of SABnzbd not needed at runtime
  - /bin/licenses
  - /bin/po
  - /bin/scripts
  - /bin/tests
  - /bin/tools
  - /bin/README.mkd
  - /bin/*.txt
cleanup-commands:
  # Scriptlets installed by pip, not needed by SABnzbd
  - find ${FLATPAK_DEST}/bin -maxdepth 1 -type f -executable -not -name 'SABnzbd.py'
    -not -name '7zz' -not -name 'par2' -not -name 'unrar' -ls -delete
modules:
  # Assorted pypi dependencies, generated from requirements-*.txt
  - pypi-dependencies-flatpak.json
  - pypi-dependencies-cryptography.json
  - pypi-dependencies-orjson.json
  # SABnzbd dependencies, generated from requirements.txt
  - pypi-dependencies.json

  - name: dbus-run-session
    buildsystem: cmake
    cleanup: ['*']
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/dbus/dbus/-/archive/dbus-1.16.2/dbus-dbus-1.16.2.tar.gz
        sha256: d77cc71acd93e85f2bd2a6fe3a40e5bd023519e3e9fa9b5361e7109f42b74060
        x-checker-data:
          type: anitya
          project-id: 5356
          url-template: https://gitlab.freedesktop.org/dbus/dbus/-/archive/dbus-$version/dbus-dbus-$version.tar.gz

  - name: dbus-python
    buildsystem: autotools
    sources:
      - type: archive
        url: https://dbus.freedesktop.org/releases/dbus-python/dbus-python-1.4.0.tar.xz
        sha256: c36b28f10ffcc8f1f798aca973bcc132f91f33eb9b6b8904381b4077766043d5
        x-checker-data:
          type: anitya
          project-id: 402
          url-template: https://dbus.freedesktop.org/releases/dbus-python/dbus-python-$version.tar.xz

  # Buildsystem used by cryptography, orjson
  - name: maturin
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/maturin/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - cargo --offline fetch --manifest-path ./Cargo.toml
      - cargo --offline build --release
      - install -Dm755 target/release/maturin -t ${FLATPAK_DEST}/bin
      - install -Dm644 maturin/__init__.py -t ${FLATPAK_DEST}/lib/python$(python -c
        'import sys; print("%s.%s" %sys.version_info[0:2])')/site-packages/maturin/
    sources:
      - cargo-sources-maturin.json
      - type: archive
        # Remember to update the associated Cargo-*.lock and regenerate cargo-sources-*.json on every version bump!
        url: https://files.pythonhosted.org/packages/e7/b3/addd877f871fb1860d46d3a4f206ecb10b946c85846805e6367631926fd3/maturin-1.14.1.tar.gz
        sha256: 9d6577a62cd08e0ceba7a0db06fb098e0c9b1b3429bad747a4f3a18215a1b3df
# Manual update only
#        x-checker-data:
#          type: pypi
#          name: maturin

  - name: orjson
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/orjson/cargo
        CARGO_NET_OFFLINE: 'true'
        RUST_BACKTRACE: '1'
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links=file://${PWD}
        --prefix=${FLATPAK_DEST} orjson --no-build-isolation
    sources:
      - cargo-sources-orjson.json
      - type: file
        # Remember to update the associated Cargo-*.lock and regenerate cargo-sources-*.json on every version bump!
        url: https://files.pythonhosted.org/packages/7e/0c/964746fcafbd16f8ff53219ad9f6b412b34f345c75f384ad434ceaadb538/orjson-3.11.9.tar.gz
        sha256: 4fef17e1f8722c11587a6ef18e35902450221da0028e65dbaaa543619e68e48f
# Manual update only
#        x-checker-data:
#          type: pypi
#          name: orjson

  - name: cryptography
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/cryptography/cargo
        CARGO_NET_OFFLINE: 'true'
        RUST_BACKTRACE: '1'
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} "cryptography" --no-build-isolation
    sources:
      - cargo-sources-cryptography.json
      - type: file
        # Remember to update the associated Cargo-*.lock and regenerate cargo-sources-*.json on every version bump!
        url: https://files.pythonhosted.org/packages/1f/99/d1c90d6041656cc6ee229dc99cd67fd0cd5aec3c5f7d72fffc27cc750054/cryptography-49.0.0.tar.gz
        sha256: f89660a348f4f78a92366240a61404e337586ef7f5909a2fef59ca88ef505493
# Manual update only
#        x-checker-data:
#          type: pypi
#          name: cryptography

  - name: 7zip
    buildsystem: simple
    subdir: CPP/7zip/Bundles/Alone2
    build-commands:
      - make -j $FLATPAK_BUILDER_N_JOBS -f makefile.gcc
      - install -D -m755 ./_o/7zz -t /app/bin
    sources:
      - type: archive
        url: https://github.com/ip7z/7zip/archive/refs/tags/26.02.tar.gz
        sha256: 7e5600ad0b21918bc41803bd84d0c2967e097fb7fbaa2e7aeb90beeb1121e54b
        x-checker-data:
          type: anitya
          project-id: 372314
          is-important: true
          stable-only: true
          url-template: https://github.com/ip7z/7zip/archive/refs/tags/$version.tar.gz

  - name: unrar
    no-autogen: true
    make-install-args:
      - DESTDIR=$(FLATPAK_DEST)
    sources:
      - type: archive
        # Find the "UnRAR source" link at https://www.rarlab.com/rar_add.htm
        url: https://www.rarlab.com/rar/unrarsrc-7.2.7.tar.gz
        sha256: 01d903a7dcf413cb2925696d7796e48e38d471f79bfe7ef3ad2aebf6c12dbefd
        x-checker-data:
          type: anitya
          project-id: 13306
          is-important: true
          url-template: https://www.rarlab.com/rar/unrarsrc-$version.tar.gz
      - type: patch
        # Patch origin is Debian, see https://github.com/debian-calibre/unrar-nonfree/tree/master/debian/patches
        path: patches/0001-fix-buildflags.patch

  - name: par2cmdline-turbo
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/animetosho/par2cmdline-turbo/archive/refs/tags/v1.4.0.tar.gz
        sha256: 6f2cb042f23d9b0c93f14cc0e16de5bd6e98bf36d8be1f8f2e886fa85ad1b972
        x-checker-data:
          type: anitya
          project-id: 372791
          is-important: true
          url-template: https://github.com/animetosho/par2cmdline-turbo/archive/refs/tags/v$version.tar.gz
      - type: script
        dest-filename: autogen.sh
        commands:
          - autoreconf --verbose --force --install

  - name: sabnzbd
    buildsystem: simple
    build-commands:
      - cp -a * /app/bin/
      - install -Dm644 linux/org.sabnzbd.sabnzbd.appdata.xml /app/share/appdata/org.sabnzbd.sabnzbd.appdata.xml
      - install -Dm644 icons/logo-arrow.svg /app/share/icons/hicolor/scalable/apps/sabnzbd.svg
      - install -Dm644 linux/sabnzbd.desktop /app/share/applications/sabnzbd.desktop
      - desktop-file-edit --set-key=Exec --set-value="SABnzbd.py --browser 1 %F" /app/share/applications/sabnzbd.desktop
    sources:
      - type: archive
        url: https://github.com/sabnzbd/sabnzbd/releases/download/5.0.4/SABnzbd-5.0.4-src.tar.gz
        sha256: ed286ab75f664407f8969331d02f56b25f067a70069c476bee1cb038c26c9350
        x-checker-data:
          type: anitya
          project-id: 44529
          stable-only: true
          is-main-source: true
          url-template: https://github.com/sabnzbd/sabnzbd/releases/download/$version/SABnzbd-$version-src.tar.gz
